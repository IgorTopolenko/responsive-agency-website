<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Digital Agency</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h2>Agency</h2>
      <nav>
        <a href="#home">Home</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </nav>
    </header>

    <section id="home" class="hero">
      <h1>We build modern websites</h1>
      <p>Fast, responsive, clean design</p>
      <button>Get Started</button>
    </section>

    <section id="services" class="services">
      <div class="card">
        <h3>Web Design</h3>
        <p>Modern and clean design</p>
      </div>

      <div class="card">
        <h3>Development</h3>
        <p>Fast and scalable websites</p>
      </div>

      <div class="card">
        <h3>SEO</h3>
        <p>Improve your Google ranking</p>
      </div>
    </section>

    <section class="about">
      <div class="about-content">
        <h2>About Us</h2>
        <p>We create websites for businesses.</p>
      </div>
    </section>

    <section id="contact" class="contact">
      <h2>Contact</h2>
      <input type="text" placeholder="Your name" />
      <input type="email" placeholder="Email" />
      <button>Send</button>
    </section>

    <footer>
      <p>© 2026 Agency</p>
    </footer>
  </body>
</html>
